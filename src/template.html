<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDOList</title>
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="modalOverlay ">
        <div class="modal">
            <h3 class="modalHeading">Create Project</h3>
            <div class="modalInputWrapper">
                <div class="modalInput">
                    <label for="nameOfProject">Name :</label>
                    <input type="text" id="nameOfProject" name="projectName">
                </div>
                <div class="creatorOptions">
                    <button class="submitProject modalButtons">Submit</button>
                    <button class="cancel modalButtons">Cancel</button>
                </div>
            </div>
        </div>

    </div>
    <header>
    <div class="header Heading">
        <h1>Task Managment Application</h1>
    </div>
    </header>
    <div class="wrapper">
        <div class="projects">
            <ul class="projectsList">
            </ul>
            <div class="createProject">
                <button class="projectCreator">+ Project</button>
            </div>
        </div>
        <div class="tasks"></div>
        <div class="toDoCreator"></div>
    </div>
    <footer></footer>
</body>
</html>
