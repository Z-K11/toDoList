<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDOList</title>
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="modalOverlay hidden">
        <div class="modal">
            <h3 class="modalHeading">Create Project</h3>
            <div class="modalInputWrapper">
                <div class="modalInput">
                    <label for="nameOfProject">Name :</label>
                    <input type="text" id="nameOfProject" name="projectName">
                </div>
                <div class="creatorOptions">
                    <button id="submitProject"class=" modalButtons">Submit</button>
                    <button id="cancel" class=" modalButtons">Cancel</button>
                </div>
            </div>
        </div>

    </div>
    <header>
    <div class="header Heading">
        <h1>Task Managment Application</h1>
    </div>
    </header>
    <div class="wrapper">
        <div class="projects">
            <ul id="projectsList">
            </ul>
            <div class="createProject">
                <button class="projectCreator">+ Project</button>
            </div>
        </div>
        <div class="tasks"></div>
        <div class="toDoCreator">
            <div class="titleWrapper todoWrapper">
                <label for="title">Title</label>
                <input type="text" id="title" name="title">
            </div>
            <div class="descriptionWrapper todoWrapper">
                <label for="description">Description</label>
                <textarea  id="description" name="description" rows="3">Write task description here</textarea>
            </div>
            <div class="dueDateWrapper todoWrapper">
                    <label for="due">Due Date</label>
                    <input type="date" id="due" name="due">
            </div>
            <div class="priorityWrapper todoWrapper">
                <label for="priority">Priority</label>
                <input type="number" id="priority" name="priority" min="1" max="7">
            </div>
            <div class="taskNotes todoWrapper">
                <label for="notes">Notes :</label>
                <textarea name="notes" id="notes" rows="3">Task notes</textarea>
            </div>
            <div class="taskSubmitter">
                <button id="submitTask">Submit</button>
            </div>
        </div>
    </div>
    <footer></footer>
</body>
</html>
